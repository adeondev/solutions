<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="viewport">
        <div id="main-slider">
            <!-- Home View -->
            <section class="view" id="home-view">
                <div id="header-brand">
                    <img src="../public/images/icon.svg" id="top-left-icon" alt="Icon">
                    <span id="brand-name">Solutions</span>
                </div>

                <div id="home-content">
                    <!-- Categoria 1: Aplicativos Gerais -->
                    <div class="category-section">
                        <h3 class="category-title">Aplicativos Gerais</h3>
                        <div class="projects-grid">
                            <!-- Project 1: Music -->
                            <div class="project-card" data-project="music">
                                <div class="project-icon-wrapper">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Youtube_Music_icon.svg" alt="Music" class="project-icon">
                                </div>
                                <div class="project-title-wrapper">
                                    <h2 class="project-title">Music</h2>
                                    <button class="info-btn" title="Information">
                                        <img src="https://www.svgrepo.com/show/59321/information-icon.svg" alt="Info" class="info-icon">
                                    </button>
                                </div>
                                <div class="project-buttons">
                                    <a href="https://github.com/adeondev/k-room-yt-music" class="btn btn-source" target="_blank" title="Source">
                                        <img src="https://www.svgrepo.com/show/361322/source-control.svg" alt="Source" class="btn-icon">
                                        <span class="btn-text">Source</span>
                                    </a>
                                </div>
                            </div>

                            <!-- Project 2: character.ai -->
                            <div class="project-card" data-project="character-ai">
                                <div class="project-icon-wrapper">
                                    <div class="text-icon">c.ai</div>
                                </div>
                                <div class="project-title-wrapper">
                                    <h2 class="project-title">character.ai</h2>
                                    <button class="info-btn" title="Information">
                                        <img src="https://www.svgrepo.com/show/59321/information-icon.svg" alt="Info" class="info-icon">
                                    </button>
                                </div>
                                <div class="project-buttons">
                                    <a href="https://github.com/adeondev/pryzen-ai" class="btn btn-source" target="_blank" title="Source">
                                        <img src="https://www.svgrepo.com/show/361322/source-control.svg" alt="Source" class="btn-icon">
                                        <span class="btn-text">Source</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Categoria 2: Escolares -->
                    <div class="category-section">
                        <h3 class="category-title">Escolares</h3>
                        <div class="projects-grid">
                            <!-- Empty Card 1 -->
                            <div class="project-card empty-card">
                                <div class="project-icon-wrapper">
                                    <div class="text-icon" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2);">?</div>
                                </div>
                                <div class="project-title-wrapper">
                                    <h2 class="project-title" style="color: rgba(255,255,255,0.5);">Em breve</h2>
                                    <button class="info-btn" title="Information" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/59321/information-icon.svg" alt="Info" class="info-icon">
                                    </button>
                                </div>
                                <div class="project-buttons">
                                    <a href="#" class="btn btn-source" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/361322/source-control.svg" alt="Source" class="btn-icon">
                                        <span class="btn-text">Source</span>
                                    </a>
                                </div>
                            </div>

                            <!-- Empty Card 2 -->
                            <div class="project-card empty-card">
                                <div class="project-icon-wrapper">
                                    <div class="text-icon" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2);">?</div>
                                </div>
                                <div class="project-title-wrapper">
                                    <h2 class="project-title" style="color: rgba(255,255,255,0.5);">Em breve</h2>
                                    <button class="info-btn" title="Information" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/59321/information-icon.svg" alt="Info" class="info-icon">
                                    </button>
                                </div>
                                <div class="project-buttons">
                                    <a href="#" class="btn btn-source" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/361322/source-control.svg" alt="Source" class="btn-icon">
                                        <span class="btn-text">Source</span>
                                    </a>
                                </div>
                            </div>

                            <!-- Empty Card 3 -->
                            <div class="project-card empty-card">
                                <div class="project-icon-wrapper">
                                    <div class="text-icon" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2);">?</div>
                                </div>
                                <div class="project-title-wrapper">
                                    <h2 class="project-title" style="color: rgba(255,255,255,0.5);">Em breve</h2>
                                    <button class="info-btn" title="Information" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/59321/information-icon.svg" alt="Info" class="info-icon">
                                    </button>
                                </div>
                                <div class="project-buttons">
                                    <a href="#" class="btn btn-source" style="opacity: 0.5; pointer-events: none;">
                                        <img src="https://www.svgrepo.com/show/361322/source-control.svg" alt="Source" class="btn-icon">
                                        <span class="btn-text">Source</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- End of home-content -->
            </section>

            <!-- Info View -->
            <section class="view" id="info-view">
                <div class="info-content">
                    <button id="back-btn">← Voltar</button>
                    <div class="scrollable-info" id="project-info-body">
                        <!-- Content will be injected here -->
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const slider = document.getElementById('main-slider');
        const infoBtns = document.querySelectorAll('.info-btn');
        const backBtn = document.getElementById('back-btn');
        const infoBody = document.getElementById('project-info-body');

        const projectData = {
            'music': {
                title: 'Controle do K-ROOM YT Music',
                description: `
                    <div class="info-header">
                        <img src="https://raw.githubusercontent.com/adeondev/k-room-yt-music/refs/heads/master/icons/icon.png" alt="K-ROOM Logo" class="info-logo">
                    </div>
                    <p class="main-desc">Uma extensão de navegador minimalista e direta para estabilizar o volume no YouTube Music usando a Web Audio API.</p>
                    <p class="main-desc">Atua como um compressor e limitador de áudio em tempo real para equilibrar o volume entre músicas baixas e altas sem distorção.</p>
                    
                    <h3>Recursos</h3>
                    <ul>
                        <li><strong>Compressor & Limitador</strong>: Controla a dinâmica das faixas para evitar distorções e equilibrar o volume.</li>
                        <li><strong>Ganho Automático</strong>: Equaliza o volume percebido entre diferentes faixas.</li>
                        <li><strong>Modo Inteligente</strong>: Detecta automaticamente se a música está muito comprimida ou dinâmica e ajusta as configurações em tempo real.</li>
                        <li><strong>Filtro Passa-Alta</strong>: Remove ruídos de sub-grave indesejados (< 30 Hz).</li>
                        <li><strong>Interface Pitch Black</strong>: Visual escuro que combina perfeitamente com o layout do YouTube Music.</li>
                        <li><strong>Suporte i18n</strong>: Disponível em Inglês e Português (pt-BR).</li>
                    </ul>

                    <h3>Como Instalar (Modo Desenvolvedor)</h3>
                    <ol>
                        <li>Clone ou baixe este repositório:
                            <pre><code>git clone https://github.com/adeondev/k-room-yt-music.git</code></pre>
                        </li>
                        <li>Abra seu navegador baseado em Chromium e vá para <code>chrome://extensions/</code>.</li>
                        <li>Ative o <strong>"Modo do desenvolvedor"</strong> no canto superior direito.</li>
                        <li>Clique em <strong>"Carregar sem compactação"</strong> e selecione a pasta da extensão.</li>
                        <li>Abra o <a href="https://music.youtube.com/" target="_blank">YouTube Music</a> e clique no ícone da extensão.</li>
                    </ol>

                    <h3>Licença</h3>
                    <p>Este projeto está sob a licença MIT.</p>
                `
            },
            'character-ai': {
                title: 'character.ai',
                description: '<p class="main-desc">Informações sobre o projeto character.ai aparecerão aqui em breve.</p>'
            }
        };

        // Horizontal Info Slider Logic
        infoBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(btn.closest('.empty-card')) return; 

                const card = btn.closest('.project-card');
                const projectId = card.getAttribute('data-project');
                const data = projectData[projectId];

                if (data) {
                    infoBody.innerHTML = `
                        <h1>${data.title}</h1>
                        ${data.description}
                    `;
                    
                    slider.classList.add('slide-left');
                }
            });
        });

        if(backBtn) {
            backBtn.addEventListener('click', () => {
                slider.classList.remove('slide-left');
            });
        }

        // Vertical Scroll Logic
        const homeContent = document.getElementById('home-content');
        let currentCategory = 0;
        const totalCategories = document.querySelectorAll('.category-section').length;
        let isScrolling = false;

        window.addEventListener('wheel', (e) => {
            if (isScrolling) return;

            // Only scroll vertically if we are on the home view (slider not shifted)
            if (slider.classList.contains('slide-left')) return;

            if (e.deltaY > 0) {
                // Scroll down
                if (currentCategory < totalCategories - 1) {
                    currentCategory++;
                    updateScroll();
                }
            } else if (e.deltaY < 0) {
                // Scroll up
                if (currentCategory > 0) {
                    currentCategory--;
                    updateScroll();
                }
            }
        });

        function updateScroll() {
            isScrolling = true;
            homeContent.style.transform = `translateY(-${currentCategory * 100}vh)`;
            
            setTimeout(() => {
                isScrolling = false;
            }, 800);
        }
    </script>
</body>
</html>
